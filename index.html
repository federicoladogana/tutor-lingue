<title>Tutor Lingue AI 🌍</title>
<style>
  :root{
    --bgA:#1a2740;--bgB:#0f1421;--card:#1a2234;--card2:#222c42;--line:#2c3850;
    --txt:#eef2fb;--muted:#94a3c4;--accent:#58cc02;--accent-d:#46a302;
    --blue:#1cb0f6;--gold:#ffc800;--red:#ff5b6e;--purple:#a560ff;--onacc:#05210a;
    --radius:18px;--shadow:0 6px 0 rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bgA) 0%,var(--bgB) 55%);background-attachment:fixed;
    color:var(--txt);min-height:100%;display:flex;flex-direction:column;align-items:center;padding:14px;padding-top:max(14px,env(safe-area-inset-top));overflow-x:hidden;transition:background .4s,color .3s}
  .app{width:100%;max-width:500px;flex:1;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);padding:7px 11px;border-radius:30px;font-weight:800;font-size:14px;cursor:default}

  .grow{flex:1}
  .iconbtn{background:var(--card);border:1px solid var(--line);color:var(--txt);width:40px;height:40px;border-radius:12px;font-size:18px;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
  h1{font-size:23px;margin:0 0 4px} h2{font-size:19px;margin:0 0 10px} h3{font-size:16px;margin:0 0 8px}
  p.sub{color:var(--muted);margin:0 0 14px;line-height:1.5;font-size:15px}

  .btn:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
  .btn.green{background:var(--accent);color:var(--onacc)} .btn.blue{background:var(--blue);color:#03263a}
  .btn.ghost{background:transparent;color:var(--muted);border:2px solid var(--line);box-shadow:none}
  .btn.gray{background:var(--card2);color:var(--muted);box-shadow:0 3px 0 rgba(0,0,0,.2)} .btn[disabled]{opacity:.45;cursor:not-allowed} .btn.sm{padding:11px;font-size:14px}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;transition:background .15s,transform .1s;text-align:left}
  .tile:active{transform:scale(.97)} .tile .e{font-size:30px;display:block;margin-bottom:8px} .tile b{font-size:15px;display:block} .tile span{font-size:12px;color:var(--muted)} .tile.wide{grid-column:1/3}

  @keyframes bnc{0%,100%{transform:translateY(0)}30%{transform:translateY(-10px) scale(1.05)}60%{transform:translateY(2px)}}
  .bubble{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;font-size:14px;line-height:1.45;flex:1}
  .bubble:before{content:"";position:absolute;left:-7px;bottom:14px;width:12px;height:12px;background:var(--card);border-left:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
  /* goal ring */
  .goalrow{display:flex;align-items:center;gap:14px}
  .ring{position:relative;width:60px;height:60px;min-width:60px} .ring svg{transform:rotate(-90deg)} .ring .c{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
  .chatwrap{display:flex;flex-direction:column;height:calc(100vh - 130px);max-height:calc(100vh - 130px)}
  .chatlog{flex:1;overflow-y:auto;padding:6px 2px 12px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:12px 14px;border-radius:16px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
  .msg.ai{background:var(--card);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px}
  .msg.me{background:var(--blue);color:#03263a;align-self:flex-end;border-bottom-right-radius:5px;font-weight:600}
  .msg.ai b{color:var(--accent)} .msg.ai i{color:var(--blue);font-style:normal;opacity:.95}

  .typing{align-self:flex-start;color:var(--muted);font-size:14px;padding:6px 4px} .typing span{animation:blink 1.2s infinite} .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
  .composer{display:flex;gap:8px;align-items:flex-end;padding-top:8px;border-top:1px solid var(--line)}

  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}

  .feedback b{font-size:17px} .feedback.ok b{color:var(--accent)} .feedback.no b{color:#ff8d99} .feedback small{display:block;color:var(--muted);margin-top:4px;font-size:14px}
  .fbm{display:flex;align-items:center;gap:8px;margin-bottom:6px} .fbm .av{font-size:26px}
  .unit-h{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:18px 4px 10px;font-weight:800}
  .lesson{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px;cursor:pointer}

  .lesson.done .ic{background:linear-gradient(135deg,var(--accent),var(--accent-d))}
  .lesson .meta{flex:1;min-width:0} .lesson .meta b{font-size:15px;display:block} .lesson .meta span{font-size:12px;color:var(--muted)}
  .bar{height:7px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:6px} .bar>i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .5s}
  .tip{background:rgba(28,176,246,.1);border:1px solid rgba(28,176,246,.3);border-radius:12px;padding:12px;font-size:14px;color:var(--blue);margin-bottom:14px;line-height:1.55}
  .step{display:flex;gap:10px;margin-bottom:12px;font-size:14px;line-height:1.5}
  .step .n{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#03263a;font-weight:900;display:flex;align-items:center;justify-content:center;flex:none}
  .hidden{display:none!important} .center{text-align:center} .bigemoji{font-size:60px;margin:6px 0}
  .stats{display:flex;gap:10px;margin:18px 0} .stat{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
  .stat b{display:block;font-size:22px;color:var(--gold)} .stat span{font-size:11px;color:var(--muted);text-transform:uppercase}
  .toast{position:fixed;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line);padding:10px 18px;border-radius:30px;font-weight:700;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:14px;transition:opacity .3s;max-width:90%;text-align:center}
  .scorebadge{font-size:46px;font-weight:900;text-align:center;margin:8px 0}
  .stars{text-align:center;font-size:28px;letter-spacing:4px;margin-bottom:8px}
  .heard{text-align:center;color:var(--muted);font-size:14px;margin-bottom:10px}
  label.f{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .chip{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:8px 14px;margin:0 6px 8px 0;font-size:14px;cursor:pointer} .chip:active{transform:scale(.96)}
  .gauge{position:relative;width:160px;height:160px;margin:6px auto 4px} .gauge svg{transform:rotate(-90deg)} .gauge .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center} .gauge .pct b{font-size:40px;line-height:1} .gauge .pct span{font-size:12px;color:var(--muted)}
  .levelbadge{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:30px;padding:8px 16px;font-weight:800;font-size:16px;margin:4px auto}
  .langrow{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer}
  .langrow:active{background:var(--card2)} .langrow.active{border-color:var(--accent)} .langrow .fl{font-size:30px} .langrow .meta{flex:1} .langrow .meta b{display:block;font-size:16px} .langrow .meta span{font-size:12px;color:var(--muted)} .langrow .pc{font-weight:900;color:var(--accent);font-size:18px}
  .ubar{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px} .ubar .nm{width:130px;color:var(--muted)} .ubar .bar{flex:1;margin:0} .ubar .vv{width:38px;text-align:right;font-weight:800}
  /* griglie avatar e temi */
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .acell{background:var(--card2);border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;transition:transform .1s}
  .acell:active{transform:scale(.95)} .acell.on{border-color:var(--accent);background:rgba(88,204,2,.12)} .acell.lock{opacity:.5}
  .acell .em{font-size:36px} .acell .nm{font-size:12px;margin-top:4px;display:block} .acell .lk{font-size:11px;color:var(--muted);display:block}
  .tcell{border:2px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px} .tcell.on{border-color:var(--accent)}
  .tsw{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.15)} .tcell b{font-size:15px}
  .switch{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .tg{width:50px;height:30px;border-radius:30px;background:var(--card2);border:1px solid var(--line);position:relative;cursor:pointer;flex:none}
  .tg i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--muted);transition:all .2s}
  .tg.on{background:var(--accent)} .tg.on i{left:25px;background:#fff}
  .seg{display:flex;gap:8px;flex-wrap:wrap} .segb{flex:1;min-width:60px;background:var(--card2);border:2px solid var(--line);border-radius:12px;padding:10px;text-align:center;font-weight:800;cursor:pointer;font-size:14px} .segb.on{border-color:var(--accent);color:var(--accent)}
  /* confetti */
  .conf{position:fixed;top:-20px;font-size:22px;z-index:60;pointer-events:none;animation:fall 1.6s ease-in forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(420deg);opacity:0}}
  /* frasario */
  .catbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
  .catbtn{white-space:nowrap;background:var(--card2);border:2px solid var(--line);border-radius:20px;padding:8px 13px;font-size:14px;font-weight:700;cursor:pointer;flex:none}
  .catbtn.on{border-color:var(--accent);color:var(--accent)}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .pc-it{font-size:13px;color:var(--muted)} .pc-t{font-size:18px;font-weight:800;margin-top:2px;line-height:1.3} .pc-t .ph{font-size:13px;color:var(--blue);font-weight:600;margin-left:6px}
  .pc-act{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .pc-act button{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:7px 12px;font-size:15px;cursor:pointer}
  .pc-act button.fav{color:var(--gold);border-color:var(--gold)}
  .bigov{position:fixed;inset:0;background:var(--bgB);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px;text-align:center;cursor:pointer}
  .bigtxt{font-size:clamp(28px,9vw,46px);font-weight:900;line-height:1.25} .bigit{font-size:18px;color:var(--muted);margin-top:20px} .bighint{position:absolute;bottom:34px;font-size:13px;color:var(--muted)}
  .bigov .bigspk{margin-top:22px;background:var(--accent);color:var(--onacc);border:none;border-radius:14px;padding:12px 22px;font-size:16px;font-weight:800}
  /* pulsanti rapidi tutor */
  .quickbar{display:flex;gap:6px;overflow-x:auto;padding:8px 0 6px;-webkit-overflow-scrolling:touch}
  .quickbar button{white-space:nowrap;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;flex:none}
  .quickbar button:active{transform:scale(.95)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <div class="pill fire">🔥 <span id="t-streak">0</span></div>
    <div class="pill gem">💎 <span id="t-xp">0</span></div>
    <div class="grow"></div>
    <div class="pill lang" id="t-lang" title="Cambia lingua">🌍</div>
    <button class="iconbtn" id="btn-settings" title="Impostazioni">⚙️</button>
  </div>
  <div id="root"></div>
</div>

<script>
/* ============================================================
   TUTOR LINGUE AI — per Federico
   Lingue: 🇬🇧🇪🇸🇫🇷🇩🇪 · AI Gemini · voce · temi · avatar · memoria · PWA
   ============================================================ */

/* ---------------- LINGUE ---------------- */
const LANGS={
  en:{name:"Inglese",flag:"🇬🇧",code:"en-US",ai:"inglese"},
  es:{name:"Spagnolo",flag:"🇪🇸",code:"es-ES",ai:"spagnolo"},
  fr:{name:"Francese",flag:"🇫🇷",code:"fr-FR",ai:"francese"},

  nl:{name:"Olandese",flag:"🇳🇱",code:"nl-NL",ai:"olandese"},
  ru:{name:"Russo",flag:"🇷🇺",code:"ru-RU",ai:"russo"},

const LANG_ORDER=["en","es","fr","de","pt","nl","ru","zh"];

/* ---------------- TEMI ---------------- */
const THEMES={
  notte:{name:"Notte",v:{'--bgA':'#1a2740','--bgB':'#0f1421','--card':'#1a2234','--card2':'#222c42','--line':'#2c3850','--txt':'#eef2fb','--muted':'#94a3c4','--accent':'#58cc02','--accent-d':'#46a302','--blue':'#1cb0f6','--gold':'#ffc800','--red':'#ff5b6e','--purple':'#a560ff','--onacc':'#05210a'}},
  giorno:{name:"Giorno",v:{'--bgA':'#e7f0ff','--bgB':'#f6f9fd','--card':'#ffffff','--card2':'#eef3fa','--line':'#dbe4f0','--txt':'#16233a','--muted':'#5b6b86','--accent':'#58cc02','--accent-d':'#46a302','--blue':'#1391d0','--gold':'#d99a00','--red':'#e23b50','--purple':'#8b3df0','--onacc':'#05210a'}},
  foresta:{name:"Foresta",v:{'--bgA':'#1a3d28','--bgB':'#0c1f15','--card':'#152e22','--card2':'#1d3d2e','--line':'#2c5a40','--txt':'#eafbf0','--muted':'#92c4a6','--accent':'#6ad04a','--accent-d':'#54b038','--blue':'#2bb3a3','--gold':'#ffce5c','--red':'#ff6b6b','--purple':'#b07cff','--onacc':'#052910'}},
  tramonto:{name:"Tramonto",v:{'--bgA':'#3c2140','--bgB':'#1d1326','--card':'#2e1d33','--card2':'#3d2742','--line':'#5a3a5e','--txt':'#fde9f3','--muted':'#c79bb8','--accent':'#ff8a3d','--accent-d':'#e0702a','--blue':'#ff5b9e','--gold':'#ffc24d','--red':'#ff5b6e','--purple':'#c06bff','--onacc':'#2a1402'}},
  oceano:{name:"Oceano",v:{'--bgA':'#0e3050','--bgB':'#07182a','--card':'#0f2c44','--card2':'#163a55','--line':'#235072','--txt':'#e6f4ff','--muted':'#8db6d6','--accent':'#1ec8c8','--accent-d':'#17a3a3','--blue':'#2ba8ff','--gold':'#ffd152','--red':'#ff6b81','--purple':'#7aa0ff','--onacc':'#04282a'}},
  lavanda:{name:"Lavanda",v:{'--bgA':'#efe9ff','--bgB':'#f8f6ff','--card':'#ffffff','--card2':'#f1ecfb','--line':'#ddd4f3','--txt':'#241a3a','--muted':'#6b5b86','--accent':'#7c4dff','--accent-d':'#6536e0','--blue':'#4f8cff','--gold':'#d99a00','--red':'#e23b66','--purple':'#9b59ff','--onacc':'#ffffff'}},
};
function applyTheme(k){const t=THEMES[k]||THEMES.notte;const r=document.documentElement;Object.entries(t.v).forEach(([p,v])=>r.style.setProperty(p,v));

async function callGemini(history,system,maxTokens){
  if(!S.apiKey)throw{type:"nokey"};
  const tryModels=[S.model||"gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];let lastErr={type:"unknown"};
  for(const m of tryModels){try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${encodeURIComponent(S.apiKey)}`,{
      method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:system}]},contents:history,generationConfig:{temperature:0.7,maxOutputTokens:maxTokens||800}})});
    if(res.status===400||res.status===403){const j=await res.json().catch(()=>({}));const s=JSON.stringify(j);
      if(s.includes("API_KEY_INVALID")||s.includes("PERMISSION_DENIED")||res.status===403)throw{type:"badkey"};
      if(s.includes("not found")||s.includes("not supported")){lastErr={type:"model"};continue;}throw{type:"http"};}
    if(res.status===429)throw{type:"quota"};if(res.status===404){lastErr={type:"model"};continue;}if(!res.ok){lastErr={type:"http"};continue;}
    const j=await res.json();const text=(j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts||[]).map(p=>p.text||"").join("").trim();
    if(!text){if(j.promptFeedback&&j.promptFeedback.blockReason)throw{type:"blocked"};lastErr={type:"empty"};continue;}
    if(m!==(S.model||"")){S.model=m;save();}return text;
  }catch(e){if(e.type==="badkey"||e.type==="quota"||e.type==="blocked")throw e;if(e instanceof TypeError){lastErr={type:"net"};}else lastErr=e;}}
  throw lastErr;
}

function startListening(onResult,onError,onEnd){if(!SR){onError&&onError({type:"nosupport"});return;}

  rec.onresult=e=>{got=true;const a=[];const r=e.results[0];for(let i=0;i<r.length;i++)a.push(r[i].transcript);onResult&&onResult(a);};
  rec.onerror=e=>onError&&onError({type:"err"});rec.onend=()=>{currentRec=null;onEnd&&onEnd(got);};
  try{rec.start();currentRec=rec;}catch(e){onError&&onError({type:"err"});}}

/* ---------------- SUONI ---------------- */
let AC;function tone(seq){if(!S.sound)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();let t=AC.currentTime;
  seq.forEach(([f,d])=>{const o=AC.createOscillator(),g=AC.createGain();o.type="sine";o.frequency.value=f;g.gain.value=0.0001;o.connect(g);g.connect(AC.destination);
    g.gain.exponentialRampToValueAtTime(0.16,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.start(t);o.stop(t+d+0.02);t+=d;});}catch(e){}}
const sOk=()=>tone([[660,.12],[880,.16]]);const sNo=()=>tone([[210,.22]]);const sWin=()=>tone([[523,.12],[659,.12],[784,.12],[1047,.22]]);

/* ---------------- CORIANDOLI ---------------- */
function confetti(){const ems=["🎉","✨","⭐","🎊","💚","🟢"];for(let i=0;i<26;i++){const s=document.createElement("div");s.className="conf";s.textContent=ems[i%ems.length];
  s.style.left=(Math.random()*100)+"vw";s.style.animationDelay=(Math.random()*0.4)+"s";s.style.fontSize=(16+Math.random()*16)+"px";document.body.appendChild(s);setTimeout(()=>s.remove(),2000);}}

/* ---------------- util ---------------- */
const $=s=>document.querySelector(s);
const el=h=>{const d=document.createElement("div");d.innerHTML=h.trim();return d.firstChild;};
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const sample=(arr,n,ex)=>shuffle(arr.filter(x=>x!==ex)).slice(0,n);
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmt(s){return esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/\n/g,"<br>");}
let toastT;function toast(m){let e=$(".toast");if(!e){e=document.createElement("div");e.className="toast";document.body.appendChild(e);}e.textContent=m;e.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>e.style.opacity=0,2400);}
function norm(s){return(s||"").toLowerCase().replace(/ß/g,"ss").normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9'\s]/g,"").replace(/\s+/g," ").trim();}
function lev(a,b){const m=a.length,n=b.length;const d=Array.from({length:m+1},(_,i)=>[i].concat(Array(n).fill(0)));for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function scorePron(t0,alts){const t=norm(t0);let best=0;(alts||[]).forEach(s=>{s=norm(s);if(!s)return;if(s===t){best=100;return;}const d=lev(t,s);best=Math.max(best,Math.round(Math.max(0,1-d/Math.max(t.length,s.length))*100));});return best;}
function refreshTop(){$("#t-streak").textContent=S.streak;$("#t-xp").textContent=S.xp;$("#t-lang").innerHTML=LANGS[S.lang].flag+" "+LANGS[S.lang].name.slice(0,3);}
function ringSVG(pct,size,col){const r=(size-10)/2,c=2*Math.PI*r,off=c*(1-Math.min(pct,100)/100);return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--card2)" stroke-width="8" fill="none"></circle><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${col}" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle></svg>`;}

let TEST=null;
function startTest(){const pool=shuffle(allWords).slice(0,12);
  TEST={qs:pool.map(w=>({q:w.it,ans:tw(w).w,word:w,opts:shuffle([tw(w).w,...sample(allWords,3,w).map(x=>tw(x).w)])})),idx:0,correct:0,answered:false,picked:null};renderTestQ();}
function renderTestQ(){const r=TEST,q=r.qs[r.idx];r.answered=false;r.picked=null;
  render(`<div class="progressrow"><button class="quit" id="quit">✕</button><div class="ptrack"><i style="width:${Math.round(r.idx/r.qs.length*100)}%"></i></div><div class="pill">${r.idx+1}/${r.qs.length}</div></div>
    <div class="prompt">🧪 Test · come si dice in ${LANGS[S.lang].name}?</div><div class="word-big">${q.q}</div>
    ${q.opts.map((o,i)=>`<div class="opt" data-v="${encodeURIComponent(o)}"><div class="k">${i+1}</div><div>${o}</div></div>`).join("")}<div id="ft"></div>`);
  $("#quit").onclick=()=>{if(confirm("Uscire dal test?"))go("level");};
  document.querySelectorAll(".opt").forEach(e=>e.onclick=()=>{if(r.answered)return;document.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));e.classList.add("sel");r.picked=decodeURIComponent(e.dataset.v);$("#tc").disabled=false;});
  $("#ft").innerHTML=`<button class="btn green" id="tc" disabled style="margin-top:14px">Verifica</button>`;
  $("#tc").onclick=()=>{const ok=r.picked===q.ans;if(ok){r.correct++;sOk();}else{sNo();addWeak(q.word.it,q.ans);}r.answered=true;
    document.querySelectorAll(".opt").forEach(e=>{const v=decodeURIComponent(e.dataset.v||"");if(v===q.ans)e.classList.add("correct");else if(v===r.picked)e.classList.add("wrong");e.style.pointerEvents="none";});speak(q.ans,false);
    $("#ft").innerHTML=`<div class="feedback ${ok?'ok':'no'}"><b>${ok?'✅ Giusto!':'Si dice: '+q.ans}</b></div><button class="btn ${ok?'green':'gray'}" id="tc2" style="margin-top:12px">${r.idx+1>=r.qs.length?'Vedi risultato':'Avanti'}</button>`;
    $("#tc2").onclick=()=>{r.idx++;if(r.idx>=r.qs.length)return finishTest();renderTestQ();};};
}
function finishTest(){const r=TEST,pct=Math.round(r.correct/r.qs.length*100),lv=levelInfo(pct);PG().__test={pct};addXP(r.correct*5);save();confetti();
  render(`<div class="card center"><div class="bigemoji">${lv.emoji}</div><h1>Risultato: ${pct}%</h1><div class="levelbadge">Livello stimato: ${lv.lvl} · ${lv.name}</div>
    <p class="sub" style="margin-top:14px">Hai risposto bene a <b>${r.correct}</b> su ${r.qs.length}.</p>
    <p class="sub">${pct>=70?"Gran bel livello! 🚀":pct>=40?"Buona base! Ripassa per salire. 💪":"Ottimo che hai iniziato: ora le lezioni ti faranno volare. 🌱"}</p>
    <button class="btn green" id="h">Vai alle lezioni</button><button class="btn ghost sm" id="b" style="margin-top:10px">Torna al livello</button></div>`);
  $("#h").onclick=()=>go("lessons");$("#b").onclick=()=>go("level");}

function addBubble(who,text){const log=$("#log");if(!log)return"";const b=document.createElement("div");b.className="msg "+who;b.innerHTML=who==="ai"?fmt(text):esc(text);
  let line="";
  if(who==="ai"){const bold=(text.match(/\*\*(.+?)\*\*/)||[])[1];
    line=bold||(text.split("\n").find(l=>l.trim()&&!/^[\*💡✅🤖👋🦉🐱🐶🦊🐰🐼🐧🐨🦁🐯🐲🦄]/.test(l)&&!/^\(/.test(l))||"").replace(/\*/g,"").trim();
    if(line){const s=document.createElement("span");s.className="say";s.innerHTML="🔊 ascolta";s.onclick=()=>speak(line,false);b.appendChild(s);}}
  log.appendChild(b);log.scrollTop=log.scrollHeight;return line;}
async function sendChat(){const inp=$("#inp");const txt=inp.value.trim();if(!txt)return;inp.value="";inp.style.height="auto";sendChatMsg(txt);}
async function sendChatMsg(txt){if(!txt||!CHAT)return;addBubble("me",txt);CHAT.history.push({role:"user",parts:[{text:txt}]});await thinkingThen(async()=>await callGemini(CHAT.history,CHAT.sys,CHAT.teaching?720:600));}
async function thinkingThen(fn){const log=$("#log");const t=el(`<div class="typing">il tutor sta scrivendo<span>.</span><span>.</span><span>.</span></div>`);log.appendChild(t);log.scrollTop=log.scrollHeight;
  try{const text=await fn();t.remove();const snip=addBubble("ai",text);CHAT.history.push({role:"model",parts:[{text}]});addXP(5);if(CHAT.teaching&&snip)speak(snip,false);}catch(e){t.remove();addBubble("ai",geminiErrMsg(e));}}
function wireMic(btn,inp){if(!btn)return;btn.onclick=()=>{if(!micSupported){toast("Microfono non disponibile. Usa Chrome.");return;}if(currentRec){stopListening();return;}
  btn.classList.add("rec");btn.textContent="⏹";toast("Parla pure... 🎤");
  startListening(a=>{inp.value=(inp.value?inp.value+" ":"")+a[0];inp.dispatchEvent(new Event("input"));},()=>toast("Non ho sentito, riprova 🎤"),()=>{btn.classList.remove("rec");btn.textContent="🎤";});};}

let RUN=null;
function buildQuestions(l){const Q=[];
  l.words.forEach((w,i)=>{Q.push({type:"choose",prompt:"Scegli la traduzione in "+LANGS[S.lang].name,q:w.it,ans:tw(w).w,word:w,opts:shuffle([tw(w).w,...sample(allWords,3,w).map(x=>tw(x).w)])});
    if(i%2===0)Q.push({type:"listen",prompt:"Ascolta e scegli il significato",ans:w.it,word:w,opts:shuffle([w.it,...sample(allWords,3,w).map(x=>x.it)])});});
  (l.sentences||[]).forEach(s=>Q.push({type:"build",prompt:"Componi la frase in "+LANGS[S.lang].name,q:s.it,ans:ts(s)}));
  return shuffle(Q).slice(0,Math.min(Q.length,12));}
function startLesson(id){const l=findLesson(id);RUN={id,l,qs:buildQuestions(l),idx:0,correct:0,answered:false,picked:null,chosen:[],tokens:[],hearts:5};renderQ();}
const PRAISE=["Bravo!","Perfetto!","Grande!","Esatto!","Sei un mito!","Continua così!"];
const NUDGE=["Quasi! Si dice così:","Tranquillo, succede 💙","Ci sei quasi! Guarda qui:","Niente paura, la impari:"];
function renderQ(){const r=RUN,q=r.qs[r.idx];r.answered=false;r.picked=null;r.chosen=[];
  render(`<div class="progressrow"><button class="quit" id="quit">✕</button><div class="ptrack"><i style="width:${Math.round(r.idx/r.qs.length*100)}%"></i></div>${S.serene?`<div class="pill">${r.idx+1}/${r.qs.length}</div>`:`<div class="hearts">${'❤'.repeat(r.hearts)||'💔'}</div>`}</div>
    <div class="prompt">${q.prompt}</div><div id="qb"></div><div id="ft"></div>`);
  $("#quit").onclick=()=>{if(confirm("Uscire dalla lezione?"))go("lessons");};const qb=$("#qb");
  if(q.type==="choose"){qb.innerHTML=`<div class="word-big">${q.q}</div>`+optHTML(q.opts);wireOpts();}
  else if(q.type==="listen"){qb.innerHTML=`<div class="speak" id="sp">🔊 Ascolta</div><div class="speak" id="sps" style="font-size:13px;padding:7px 14px">🐢 più lento</div>`+optHTML(q.opts);$("#sp").onclick=()=>speak(tw(q.word).w,false);$("#sps").onclick=()=>speak(tw(q.word).w,true);speak(tw(q.word).w,false);wireOpts();}
  else if(q.type==="build"){const tgt=q.ans.replace(/[.,?!¿¡]/g,"").split(" ").filter(Boolean);const dis=sample(allWords,2).flatMap(w=>tw(w).w.split(" ")).filter(x=>!tgt.includes(x)).slice(0,2);r.tokens=shuffle(tgt.concat(dis));
    qb.innerHTML=`<div class="word-big" style="font-size:21px">${q.q}</div><div class="speak" id="sp">🔊 senti la risposta</div><div style="min-height:54px;border-bottom:2px dashed var(--line);display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;margin-bottom:16px" id="ans"></div><div style="display:flex;flex-wrap:wrap;gap:8px" id="bank"></div>`;$("#sp").onclick=()=>speak(q.ans,false);renderBuild(q);}
  $("#ft").innerHTML=`<button class="btn green" id="check" disabled style="margin-top:16px">Verifica</button>`;$("#check").onclick=()=>checkA(q);
}
function optHTML(opts){return opts.map((o,i)=>`<div class="opt" data-v="${encodeURIComponent(o)}"><div class="k">${i+1}</div><div>${o}</div></div>`).join("");}
function wireOpts(){document.querySelectorAll(".opt").forEach(e=>e.onclick=()=>{if(RUN.answered)return;document.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));e.classList.add("sel");RUN.picked=decodeURIComponent(e.dataset.v);$("#check").disabled=false;});}
function renderBuild(q){const ans=$("#ans"),bank=$("#bank"),ch=RUN.chosen;ans.innerHTML=ch.map((t,i)=>`<div class="opt" style="margin:0;padding:9px 13px;font-size:15px" data-i="${i}">${t}</div>`).join("");
  const need={};ch.forEach(t=>need[t]=(need[t]||0)+1);const set=new Set(),seen={};RUN.tokens.forEach((t,i)=>{seen[t]=seen[t]||0;if(seen[t]<(need[t]||0)){set.add(i);seen[t]++;}});
  bank.innerHTML=RUN.tokens.map((t,i)=>`<div class="opt" style="margin:0;padding:9px 13px;font-size:15px;${set.has(i)?'opacity:.25;pointer-events:none':''}" data-i="${i}">${t}</div>`).join("");
  ans.querySelectorAll("[data-i]").forEach(e=>e.onclick=()=>{if(RUN.answered)return;ch.splice(+e.dataset.i,1);renderBuild(q);});
  bank.querySelectorAll("[data-i]").forEach(e=>e.onclick=()=>{if(RUN.answered)return;ch.push(RUN.tokens[+e.dataset.i]);renderBuild(q);});
  if($("#check"))$("#check").disabled=ch.length===0;}
function checkA(q){const r=RUN;if(r.answered){nextQ();return;}let ok=false;
  if(q.type==="build"){ok=norm(r.chosen.join(" "))===norm(q.ans);}
  else{ok=r.picked===q.ans;document.querySelectorAll(".opt").forEach(e=>{const v=decodeURIComponent(e.dataset.v||"");if(v===q.ans)e.classList.add("correct");else if(v===r.picked)e.classList.add("wrong");e.style.pointerEvents="none";});}
  r.answered=true;
  if(ok){r.correct++;sOk();if(q.type==="choose")clearWeakHit(q.ans);}else{sNo();if(!S.serene&&r.hearts>0)r.hearts--;if(q.type!=="listen")addWeak(q.q,q.ans);}
  const sayT=q.type==="listen"?tw(q.word).w:q.ans;speak(sayT,false);
  const mood=ok?PRAISE[Math.floor(Math.random()*PRAISE.length)]:NUDGE[Math.floor(Math.random()*NUDGE.length)];
  const extra=q.type==="listen"?`<small>“${tw(q.word).w}” = ${q.word.it}</small>`:`<small>Risposta: <b>${q.ans}</b></small>`;
  $("#ft").innerHTML=`<div class="feedback ${ok?'ok':'no'}"><div class="fbm"><span class="av">${S.avatar}</span><b>${ok?'✅ '+mood:'💪 '+mood}</b></div>${ok?'':extra}</div><button class="btn ${ok?'green':'gray'}" id="cont" style="margin-top:12px">Continua</button>`;
  $("#cont").onclick=nextQ;}
function nextQ(){const r=RUN;r.idx++;if(r.idx>=r.qs.length)return finishLesson();renderQ();}
function finishLesson(){const r=RUN;const score=Math.round(r.correct/r.qs.length*100);const g=r.correct*10+(score===100?20:0);addXP(g);
  const p=PG()[r.id]||{best:0,done:false};p.best=Math.max(p.best,score);if(score>=60)p.done=true;PG()[r.id]=p;save();
  const emoji=score===100?"🏆":score>=60?"🎉":"🌱";const pct=knowledge(S.lang);if(score>=60){confetti();sWin();}

    <div class="mascot" style="justify-content:center"><div class="avatar bounce">${S.avatar}</div><div class="bubble">${score>=60?'Sei stato bravissimo, '+(S.profile.name||'Federico')+'! 👏':'Va benissimo così, riprova e migliorerai 💙'}</div></div>

    <button class="btn green" id="h">Torna alle lezioni</button><button class="btn ghost sm" id="a" style="margin-top:10px">Riprova</button></div>`);

  const favB=el(`<div class="catbtn ${PB.cat===-1&&!PB.query?'on':''}">⭐ Preferiti</div>`);favB.onclick=()=>{PB.cat=-1;PB.query="";$("#pq").value="";drawPB(cats);markCat();};catbar.appendChild(favB);
  cats.forEach((c,i)=>{const b=el(`<div class="catbtn ${PB.cat===i&&!PB.query?'on':''}" data-ci="${i}">${c.name}</div>`);b.onclick=()=>{PB.cat=i;PB.query="";$("#pq").value="";drawPB(cats);markCat();};catbar.appendChild(b);});
  const pq=$("#pq");pq.addEventListener("input",()=>{PB.query=pq.value;drawPB(cats);markCat();});
  drawPB(cats);
};
function markCat(){document.querySelectorAll("#catbar .catbtn").forEach((b,idx)=>{const ci=b.dataset.ci!==undefined?+b.dataset.ci:-1;b.classList.toggle("on",!PB.query&&ci===PB.cat);});}
function drawPB(cats){const list=$("#plist");if(!list)return;let items=[];const q=norm(PB.query);
  if(q){cats.forEach(c=>c.items.forEach(it=>{if(norm(it.it).includes(q)||norm(it.t).includes(q))items.push(it);}));}
  else if(PB.cat===-1){cats.forEach(c=>c.items.forEach(it=>{if(S.favs.includes(it.it))items.push(it);}));}
  else{items=(cats[PB.cat]||cats[0]).items;}
  const seen={};items=items.filter(it=>{if(seen[it.it])return false;seen[it.it]=1;return true;});
  if(!items.length){list.innerHTML=`<p class="sub center" style="margin-top:20px">${PB.cat===-1&&!q?'Nessun preferito ancora. Tocca ⭐ su una frase per salvarla qui. 🌟':'Niente trovato 🔍'}</p>`;return;}
  list.innerHTML="";
  items.forEach(it=>{const fav=S.favs.includes(it.it);const t=it.t||"";
    const card=el(`<div class="pcard"><div class="pc-it">${esc(it.it)}</div>
      <div class="pc-t">${esc(t||"—")}${it.ph?`<span class="ph">${esc(it.ph)}</span>`:""}</div>
      <div class="pc-act"><button data-a="say">🔊</button><button data-a="slow">🐢</button>
      <button data-a="fav" class="${fav?'fav':''}">${fav?'⭐':'☆'}</button>
      <button data-a="big">👁</button><button data-a="copy">📋</button></div></div>`);
    card.querySelector('[data-a=say]').onclick=()=>speak(t,false);
    card.querySelector('[data-a=slow]').onclick=()=>speak(t,true);
    card.querySelector('[data-a=fav]').onclick=()=>{toggleFav(it.it);drawPB(cats);};
    card.querySelector('[data-a=big]').onclick=()=>showBig(t,it.it);
    card.querySelector('[data-a=copy]').onclick=()=>copyText(t);
    list.appendChild(card);});
}

/* ---- PROFILO (memoria AI) ---- */
SCREENS.profile=function(){
  render(`<div class="head"><button class="back">←</button><h2>🧠 Il mio profilo</h2></div>
    <p class="sub">Queste info le ricorda l'AI per renderti le lezioni e le chiacchierate più tue. Restano salvate sul dispositivo.</p>
    <div class="card">
      <label class="f">Come ti chiami?</label><input class="txt" id="p-name" value="${esc(S.profile.name)}" placeholder="Es: Federico" style="width:100%">
      <label class="f">Di cosa ti piace parlare? (interessi)</label><input class="txt" id="p-int" value="${esc(S.profile.interests)}" placeholder="Es: calcio, viaggi, cucina, musica" style="width:100%">
      <label class="f">Perché studi? (obiettivi)</label><input class="txt" id="p-goal" value="${esc(S.profile.goals)}" placeholder="Es: lavoro in ufficio, colloqui, viaggi" style="width:100%">
      <button class="btn green" id="psave" style="margin-top:14px">Salva</button>
    </div>
    <div class="card"><h3>Parole che sbagli (${weakHere().length})</h3>
      <div id="wlist" style="font-size:14px;color:var(--muted);line-height:1.8"></div>
      ${weakHere().length?'<button class="btn gray sm" id="wclear" style="margin-top:10px">Svuota lista</button>':''}</div>`);
  $(".back").onclick=()=>go("home");
  const wl=$("#wlist");const wk=weakHere();wl.innerHTML=wk.length?wk.map(x=>`<span class="chip">${esc(x.w)} <span style="opacity:.6">(${esc(x.it)})</span></span>`).join(""):"Nessuna per ora 🌟";
  $("#psave").onclick=()=>{S.profile.name=$("#p-name").value.trim()||"Federico";S.profile.interests=$("#p-int").value.trim();S.profile.goals=$("#p-goal").value.trim();save();toast("Profilo salvato ✅ L'AI ora ti conosce meglio");go("home");};
  if($("#wclear"))$("#wclear").onclick=()=>{S.profile.weak=S.profile.weak.filter(x=>x.lang!==S.lang);save();toast("Lista svuotata");go("profile");};
};

/* ---- TEMI ---- */
SCREENS.themes=function(){
  render(`<div class="head"><button class="back">←</button><h2>🎨 Tema</h2></div><p class="sub">Scegli il look dell'app. Cambia subito!</p><div id="tg" style="display:flex;flex-direction:column;gap:10px"></div>`);
  $(".back").onclick=()=>go("settings");const g=$("#tg");
  Object.entries(THEMES).forEach(([k,t])=>{const c=el(`<div class="tcell ${S.theme===k?'on':''}"><div class="tsw" style="background:linear-gradient(135deg,${t.v['--bgB']},${t.v['--accent']})"></div><b>${t.name}</b>${S.theme===k?'<span style="margin-left:auto">✓</span>':''}</div>`);
    c.onclick=()=>{applyTheme(k);save();go("themes");};g.appendChild(c);});
};

/* ---- IMPOSTAZIONI ---- */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.finally(()=>deferredPrompt=null);}else{toast("Apri il menu ⋮ di Chrome → \"Installa app\" / \"Aggiungi a schermata Home\"");}}
SCREENS.settings=function(){
  render(`<div class="head"><button class="back">←</button><h2>⚙️ Impostazioni</h2></div>
    <div class="menu" style="margin-bottom:14px">
      <div class="tile" data-go="profile"><span class="e">🧠</span><b>Il mio profilo</b><span>Cosa ricorda l'AI</span></div>
      <div class="tile" data-go="themes"><span class="e">🎨</span><b>Tema</b><span>${THEMES[S.theme].name}</span></div>
      <div class="tile" data-go="avatars"><span class="e">🐾</span><b>Avatar</b><span>${S.avatar}</span></div>
      <div class="tile" data-go="langpick"><span class="e">🌍</span><b>Lingua</b><span>${LANGS[S.lang].name}</span></div>
    </div>
    <div class="card"><h3>Obiettivo giornaliero</h3><div class="seg" id="goalseg">
      ${[[10,"Soft"],[20,"Normale"],[40,"Serio"],[60,"Intenso"]].map(([v,n])=>`<div class="segb ${S.goal===v?'on':''}" data-v="${v}">${n}<br><small style="color:var(--muted)">${v} XP</small></div>`).join("")}</div></div>
    <div class="card"><h3>Preferenze</h3>
      <div class="switch"><div>🔊 Suoni</div><div class="tg ${S.sound?'on':''}" id="tg-sound"><i></i></div></div>
      <div class="switch" style="border:none"><div>💚 Modalità serena <small style="color:var(--muted)">(senza cuori/pressione)</small></div><div class="tg ${S.serene?'on':''}" id="tg-serene"><i></i></div></div></div>
    <button class="btn green" id="install">📲 Installa l'app sul telefono</button>
    <div class="card" style="margin-top:14px"><h3>Chiave AI (Google Gemini)</h3>
      <p class="sub">Gratuita, da <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a>.</p>
      <input class="txt" id="key-in" placeholder="AIza..." value="${S.apiKey?esc(S.apiKey):''}" style="width:100%;margin-bottom:10px" autocomplete="off">
      <button class="btn green sm" id="ksave">Salva chiave</button><button class="btn ghost sm" id="ktest" style="margin-top:8px">🔌 Prova se funziona</button><div id="tout" style="margin-top:10px"></div></div>
    <div class="card"><h3>Progressi</h3><div class="stats"><div class="stat"><b>${S.xp}</b><span>XP totali</span></div><div class="stat"><b>🔥${S.streak}</b><span>Giorni</span></div></div><div id="langprog"></div>
      <button class="btn gray sm" id="reset" style="margin-top:10px">↺ Azzera progressi di ${LANGS[S.lang].name}</button></div>
    <div class="tip">🎤 Per parlare usa <b>Chrome</b>. Lezioni e pronuncia vanno anche offline; l'AI ha bisogno di internet.</div>`);
  $(".back").onclick=()=>go("home");
  document.querySelectorAll("[data-go]").forEach(t=>t.onclick=()=>go(t.dataset.go));
  document.querySelectorAll("#goalseg .segb").forEach(b=>b.onclick=()=>{S.goal=+b.dataset.v;save();go("settings");});
  $("#tg-sound").onclick=()=>{S.sound=!S.sound;save();if(S.sound)sOk();go("settings");};
  $("#tg-serene").onclick=()=>{S.serene=!S.serene;save();go("settings");};
  $("#install").onclick=installApp;
  const lp=$("#langprog");LANG_ORDER.forEach(c=>lp.appendChild(el(`<div class="ubar"><div class="nm">${LANGS[c].flag} ${LANGS[c].name}</div><div class="bar"><i style="width:${knowledge(c)}%"></i></div><div class="vv">${knowledge(c)}%</div></div>`)));
  $("#ksave").onclick=()=>{const v=$("#key-in").value.trim();if(v.length<20){toast("Chiave troppo corta 🤔");return;}S.apiKey=v;S.model="";save();toast("Chiave salvata ✅");};
  $("#ktest").onclick=async()=>{const v=$("#key-in").value.trim();if(v){S.apiKey=v;save();}$("#tout").innerHTML=`<div class="typing">provo<span>.</span><span>.</span><span>.</span></div>`;try{await callGemini([{role:"user",parts:[{text:"Say only: OK"}]}],"Reply with just OK",10);$("#tout").innerHTML=`<div class="feedback ok"><b>✅ Funziona! L'AI è pronta.</b></div>`;}catch(e){$("#tout").innerHTML=`<div class="feedback no"><b>${geminiErrMsg(e)}</b></div>`;}};
  $("#reset").onclick=()=>{if(confirm("Azzerare i progressi di "+LANGS[S.lang].name+"? (chiave, profilo e altre lingue restano)")){S.prog[S.lang]={};save();toast("Progressi azzerati");go("settings");}};
};

/* ---------------- AVVIO ---------------- */
applyTheme(S.theme);
refreshTop();
go(S.apiKey?"home":"setup");
if('serviceWorker'in navigator&&location.protocol.startsWith('http')){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
